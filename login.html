<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/favicon.png">
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Login - Vireon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">

    <style>
        :root {
            --vireon-cyan: #00f2ff;
            --vireon-navy: #0a192f;
            --vireon-glow: rgba(0, 242, 255, 0.5);
            --primary-colour: #0a192f;
            --secondary-colour: #0d2847;
            --accent: #00f2ff;
            --primary-background: #050b14;
            --secondary-background: #0b1a2e;
            --primary-text: #ffffff;
            --secondary-text: rgba(255,255,255,0.72);
            --border: rgba(0, 242, 255, 0.12);
            --white: #ffffff;
            --font-primary: 'Inter', -apple-system, sans-serif;
            --font-secondary: 'Inter', -apple-system, sans-serif;
            --radius-input: 10px;
            --radius-btn: 10px;
            --card-bg: rgba(10, 25, 47, 0.92);
            --card-border: rgba(0, 242, 255, 0.08);
            --hero-bg-mobile: #0a192f;
        }
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            outline: none; 
        }
        
        body {
            background: linear-gradient(180deg, #000 0%, rgba(0,0,0,0.4) 26%, #000 100%),
                        var(--hero-bg-mobile) center/cover no-repeat;
            color: var(--primary-text);
            font-family: var(--font-secondary);
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 70% 20%, rgba(0, 242, 255, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 80%, rgba(0, 242, 255, 0.04) 0%, transparent 50%);
            pointer-events: none;
            animation: glowPulse 8s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
        .auth-wrapper { 
            width: 100%; 
            max-width: 420px; 
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: var(--card-bg);
            border-radius: 20px; 
            padding: 45px 40px 40px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid var(--card-border);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(12px);
        }

        .auth-card:hover {
            border-color: rgba(0, 242, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 40px rgba(0, 242, 255, 0.04);
        }
        .logo-container {
            margin-bottom: 30px;
            text-align: center;
        }
        .logo-text {
            font-family: var(--font-primary);
            font-weight: 900;
            font-size: 2rem;
            color: var(--accent);
            letter-spacing: -0.04em;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s ease;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }
        .logo-text:hover {
            transform: scale(1.04);
        }
        .logo-text span {
            color: #fff;
        }
        .header-group { 
            margin-bottom: 30px; 
            text-align: center; 
        }
        .header-group h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--primary-text);
            font-family: var(--font-primary);
            letter-spacing: -0.02em;
        }
        .header-group h2 .gold {
            background: linear-gradient(135deg, var(--accent), #7af0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-group p {
            font-size: 0.95rem;
            color: var(--secondary-text);
            font-weight: 400;
        }
        .form-group { 
            margin-bottom: 18px; 
            text-align: left; 
        }
        
        .form-group label { 
            display: block; 
            font-size: 0.85rem; 
            color: rgba(255,255,255,0.8); 
            margin-bottom: 6px; 
            font-weight: 600; 
            letter-spacing: 0.2px;
            font-family: var(--font-primary);
        }
        
        .form-group label i {
            margin-right: 6px;
            color: var(--accent);
        }
        
        .input-wrapper { 
            position: relative; 
        }
        
        .input-wrapper input {
            width: 100%; 
            padding: 14px 46px 14px 16px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: var(--radius-input); 
            color: var(--primary-text); 
            font-size: 0.95rem; 
            outline: none; 
            transition: all 0.3s ease;
            font-family: var(--font-secondary);
            font-weight: 500;
        }

        .input-wrapper input::placeholder {
            color: rgba(255,255,255,0.3);
            font-weight: 400;
        }

        .input-wrapper input:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 0 4px rgba(0, 242, 255, 0.08); 
            background: rgba(255,255,255,0.08);
        }
        .input-wrapper i.icon-right {
            position: absolute; 
            right: 15px; 
            top: 50%; 
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4); 
            font-size: 1rem; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .input-wrapper i.icon-right:hover { 
            color: var(--accent); 
        }
        .form-options { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 0.85rem; 
            margin-bottom: 25px; 
            margin-top: 4px;
        }
        .form-options label { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer; 
            color: rgba(255,255,255,0.6); 
            font-weight: 500;
            transition: color 0.3s;
        }
        .form-options label:hover {
            color: #fff;
        }
        .form-options input[type="checkbox"] { 
            accent-color: var(--accent); 
            width: 14px; 
            height: 14px; 
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .form-options a { 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 600; 
            transition: 0.3s; 
        }
        .form-options a:hover { 
            color: #7af0ff;
            text-decoration: underline; 
        }
        .btn {
            width: 100%; 
            padding: 15px; 
            border-radius: var(--radius-btn); 
            font-weight: 700; 
            font-size: 1rem;
            border: none; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            margin-top: 10px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 10px;
            font-family: var(--font-primary);
            position: relative;
            overflow: hidden;
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--accent), #7af0ff);
            color: var(--vireon-navy); 
            box-shadow: 0 4px 25px rgba(0, 242, 255, 0.25);
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 40px rgba(0, 242, 255, 0.35);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255,255,255,0.15) 50%,
                transparent 60%
            );
            transform: translateX(-100%) rotate(45deg);
            transition: 0.6s;
        }
        .btn-primary:hover::after {
            transform: translateX(100%) rotate(45deg);
        }
        .auth-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--secondary-text);
        }
        .auth-footer a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
        }
        .auth-footer a:hover {
            color: #7af0ff;
            text-decoration: underline;
        }
        .error-msg { 
            color: #ff6b6b; 
            font-size: 0.9rem; 
            margin-bottom: 20px; 
            background: rgba(255, 0, 0, 0.08); 
            padding: 12px; 
            border-radius: var(--radius-input); 
            border: 1px solid rgba(255, 0, 0, 0.15); 
            text-align: left; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        .error-msg i {
            font-size: 1.1rem;
            color: #ff6b6b;
        }

        .success-msg {
            color: #69db7c;
            font-size: 0.9rem;
            margin-bottom: 20px;
            background: rgba(0, 242, 255, 0.06);
            padding: 12px;
            border-radius: var(--radius-input);
            border: 1px solid rgba(0, 242, 255, 0.1);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .success-msg i {
            font-size: 1.1rem;
            color: #69db7c;
        }
        .spinner {
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 22px 0 18px;
            color: rgba(255,255,255,0.25);
            font-size: 0.8rem;
            font-weight: 500;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }
        @media (max-width: 480px) { 
            .auth-card { 
                padding: 30px 20px; 
            }
            .header-group h2 {
                font-size: 1.5rem;
            }
            .logo-text {
                font-size: 1.6rem;
            }
            .form-options {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }

        @media (max-width: 400px) {
            .auth-card {
                padding: 24px 16px;
            }
            .header-group h2 {
                font-size: 1.3rem;
            }
            .btn {
                padding: 13px;
                font-size: 0.9rem;
            }
            .input-wrapper input {
                padding: 12px 42px 12px 14px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo-container">
                <img height="30px" src="logo.png" alt="Logo">
            </div>

            <div class="header-group">
                <h2 style="font-weight:900;font-size:2rem;">Welcome <span class="gold">Back</span></h2>
                <p>Sign in to continue earning</p>
            </div>

            <form action="login.html" method="GET" id="loginForm">
                <div class="form-group">
                    <label><i class="ri-user-3-line"></i> Email or Username</label>
                    <div class="input-wrapper">
                        <input type="text" name="login" id="login" placeholder="Enter your email or username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="ri-lock-2-line"></i> Password</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" id="password" placeholder="Enter your password" required>
                        <i class="ri-eye-line icon-right" onclick="togglePassword('password', this)"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="ri-login-circle-line"></i>
                    Sign In
                </button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
            
        </div>
    </div>
</body>
</html>
